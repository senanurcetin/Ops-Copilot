name: Ops-Copilot CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Build application
        run: npm run build
        env:
          GEMINI_API_KEY: ci-placeholder
          NEXT_PUBLIC_FIREBASE_API_KEY: ci-placeholder
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci-placeholder.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-placeholder
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-placeholder.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "0000000000"
          NEXT_PUBLIC_FIREBASE_APP_ID: 1:0000000000:web:placeholder
