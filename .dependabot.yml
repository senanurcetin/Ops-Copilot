version: 2
updates:
  # Enable version updates for npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 10
    reviewers:
      - "senanurcetin"
    assignees:
      - "senanurcetin"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    pull-request-branch-name:
      separator: "/"
    rebase-strategy: "auto"
    allow:
      - dependency-type: "all"
    ignore:
      # Add any dependencies to ignore here if needed
      # - dependency-name: "package-name"

  # Enable security updates for npm (runs daily)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "01:00"
    pull-request-branch-name:
      separator: "/"
    rebase-strategy: "auto"
    commit-message:
      prefix: "security(deps)"
      include: "scope"
    reviewers:
      - "senanurcetin"
    assignees:
      - "senanurcetin"
    allow:
      - dependency-type: "all"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    reviewers:
      - "senanurcetin"
    commit-message:
      prefix: "chore(ci)"
